<!DOCTYPE html>
<html>
<head>
  <title>Tasca Voicebot</title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <script type="module">
    import Vapi from "https://esm.sh/@vapi-ai/web";

    const vapi = new Vapi(
      "d0aaa84a-d46f-49a4-b534-5f541916a571"
    );

    let callStarted = false;

  window.startCall = async () => {
  if (callStarted) return;

  try {
    // Ask mic permission FIRST
    await navigator.mediaDevices.getUserMedia({
      audio: true,
    });

    callStarted = true;

    // Start assistant AFTER permission
    await vapi.start(
      "138bbe8c-57ea-484e-9c01-bcd4e7419b11"
    );

    console.log("Call started");

    // Small delay helps mobile audio initialize
    setTimeout(() => {
      vapi.say(
        "Hello, welcome to Tasca do Miradouro. How can I help you today?"
      );
    }, 1000);

  } catch (e) {
    console.error(e);

    alert(
      "Unable to start voice call. Please allow microphone access."
    );

    callStarted = false;
  }
};
    window.endCall = async () => {
      try {
        await vapi.stop();

        callStarted = false;
      } catch (e) {
        console.error(e);
      }
    };

    vapi.on("call-start", () => {
      console.log("Call started");
    });

    vapi.on("call-end", () => {
      console.log("Call ended");

      callStarted = false;
    });

    vapi.on("error", (e) => {
      console.error(e);

      alert("Voice session error");

      callStarted = false;
    });
  </script>
</head>

<body
  style="
    font-family: sans-serif;
    text-align: center;
    padding-top: 100px;
    background: #111827;
    color: white;
  "
>
  <h1>
    Tasca do Miradouro Voice Assistant
  </h1>

  <p>
    Speak with our AI restaurant assistant for reservations,
    menu recommendations, and restaurant information.
  </p>

  <button
    onclick="startCall()"
    style="
      padding: 15px 30px;
      font-size: 18px;
      cursor: pointer;
      margin-right: 10px;
      border: none;
      border-radius: 8px;
      background: #10b981;
      color: white;
    "
  >
    Start Voice Call
  </button>

  <button
    onclick="endCall()"
    style="
      padding: 15px 30px;
      font-size: 18px;
      cursor: pointer;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 8px;
    "
  >
    End Call
  </button>
</body>
</html>
